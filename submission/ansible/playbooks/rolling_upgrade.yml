---
# Upgrade Replica 10.10.0.15
- name: Upgrade replica node 5
  hosts: redis-node-5
  become: yes

  tasks:
    - name: Upgrade redis
      apt:
        name: redis-server
        state: latest

    - name: Restart redis
      service:
        name: redis-server
        state: restarted

    - name: Wait
      pause:
        seconds: 10


