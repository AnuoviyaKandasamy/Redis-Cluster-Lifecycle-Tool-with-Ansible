# Failover Master 11 -> Replica 15
- name: Failover master 11
  hosts: redis-node-5
  gather_facts: false

  tasks:
    - name: Promote replica
      shell: redis-cli CLUSTER FAILOVER TAKEOVER

    - pause:
        seconds: 15


